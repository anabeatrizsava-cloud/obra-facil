async function loadNotifications() {
  const content = document.getElementById('bell-content');
  if (!content) return;
  content.innerHTML = '<div style="padding:12px 16px;font-size:12px;color:#484F58;">Carregando...</div>';

  const hoje = new Date().toISOString().split('T')[0];
  const notifs = [];

  try {
    const snap = await getDocs((currentRole === 'admin' ? query(obrasCol()) : query(obrasCol(), where('uid','==',uid()))));
    const obras = snap.docs.map(d => ({id:d.id,...d.data()}));

    for (const o of obras) {
      const tSnap = await getDocs(sub(o.id,'tarefas'));
      tSnap.docs.forEach(d => {
        const t = d.data();
        if (!t.data_prevista || t.status === 'concluida') return;
        const prazo = new Date(t.data_prevista + 'T00:00:00');
        const diffDias = Math.ceil((prazo - new Date(hoje)) / (1000*60*60*24));
        if (diffDias === 0) {
          notifs.push({tipo:'tarefa', obra:o.nome, texto:'⏰ Vence hoje: ' + t.nome, icon:'📋', urgencia:'hoje'});
        } else if (diffDias === 1) {
          notifs.push({tipo:'tarefa', obra:o.nome, texto:'Vence amanhã: ' + t.nome, icon:'📋', urgencia:'amanha'});
        } else if (diffDias === 2 || diffDias === 3) {
          notifs.push({tipo:'tarefa', obra:o.nome, texto:'Vence em ' + diffDias + ' dias: ' + t.nome, icon:'📋', urgencia:'proxima'});
        } else if (diffDias < 0) {
          notifs.push({tipo:'tarefa', obra:o.nome, texto:'⚠ Atrasada: ' + t.nome, icon:'🔴', urgencia:'atrasada'});
        }
      });
      const cSnap = await getDocs(sub(o.id,'contas'));
      cSnap.docs.forEach(d => {
        const c = d.data();
        if (c.data_vencimento === hoje && c.status === 'pendente') {
          notifs.push({tipo:'conta', obra:o.nome, texto: c.descricao + ' — ' + fmtR(c.valor), icon:'💰'});
        }
      });
      const ncSnap = await getDocs(sub(o.id,'nao_conformidades'));
      ncSnap.docs.forEach(d => {
        const nc = d.data();
        if (nc.prazo === hoje && nc.status === 'aberta') {
          notifs.push({tipo:'nc', obra:o.nome, texto: nc.descricao, icon:'⚠'});
        }
      });
    }
  } catch(e) {}

  // Notificações de suporte
  try {
    const nSnap = await getDocs(query(
      collection(db,'notificacoes'),
      where('para','==',currentUser.email),
      where('lida','==',false)
    ));
    nSnap.docs.forEach(d => {
      const n = d.data();
      notifs.push({
        tipo:'suporte',
        obra: n.tipo === 'suporte_resolvido' ? 'Demanda resolvida' : n.tipo === 'atualizacao_sistema' ? 'Atualização do sistema' : 'Suporte',
        texto: n.texto,
        icon: n.tipo === 'suporte_resolvido' ? '✅' : n.tipo === 'atualizacao_sistema' ? '🚀' : '🎫',
        notifId: d.id
      });
    });
  } catch(e) {}

  const dot = document.getElementById('bell-dot');
  if (dot) dot.style.display = notifs.length ? 'block' : 'none';

  if (!notifs.length) {
    content.innerHTML = '<div style="padding:16px;text-align:center;font-size:12px;color:#484F58;">Nenhuma notificação</div>';
    return;
  }

  content.innerHTML = notifs.map(n => {
    const click = n.notifId ? ' onclick="window.marcarLida(\'' + n.notifId + '\')" style="cursor:pointer;"' : '';
    const cor = n.urgencia==='atrasada'?'#9A4A53':n.urgencia==='hoje'?'#8C603E':n.urgencia==='amanha'?'#8B949E':'#484F58';
    const bg = n.urgencia==='atrasada'?'background:#2A1014;':n.urgencia==='hoje'?'background:#2A1C0A;':'';
    return '<div' + click + ' style="padding:10px 16px;border-bottom:0.5px solid #21262D;display:flex;align-items:flex-start;gap:10px;' + bg + '">' +
      '<span style="font-size:14px;flex-shrink:0;">' + n.icon + '</span>' +
      '<div>' +
        '<div style="font-size:12px;color:' + cor + ';">' + n.texto + '</div>' +
        '<div style="font-size:11px;color:#484F58;margin-top:2px;">' + n.obra + (n.notifId ? ' · clique para marcar como lida' : '') + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

window.marcarLida = async (notifId) => {

  await loadNotifications();

async function initBell() {
  if (!currentUser) return;
  // Load notifications count on startup
  const hoje = new Date().toISOString().split('T')[0];
  try {
    const snap = await getDocs((currentRole === 'admin' ? query(obrasCol()) : query(obrasCol(), where('uid','==',uid()))));
    const obras = snap.docs.map(d => ({id:d.id,...d.data()}));
    let count = 0;
    for (const o of obras) {
      const tSnap = await getDocs(sub(o.id,'tarefas'));
      tSnap.docs.forEach(d => {
        const t=d.data();
        if (!t.data_prevista||t.status==='concluida') return;
        const prazo = new Date(t.data_prevista+'T00:00:00');
        const diffDias = Math.ceil((prazo - new Date(hoje))/(1000*60*60*24));
        if (diffDias <= 3) count++;
      });
      const cSnap = await getDocs(sub(o.id,'contas'));
      cSnap.docs.forEach(d => { const c=d.data(); if(c.data_vencimento===hoje&&c.status==='pendente') count++; });
    }
    const dot = document.getElementById('bell-dot');
    if (dot && count > 0) dot.style.display = 'block';
  } catch(e) {}
}

window.salvarUsuario = async (perfil) => {
  const email = document.getElementById('usr-email-' + perfil).value.trim().toLowerCase();
  if (!email || !email.includes('@')) return alert('E-mail inválido');
  if (email === ADMIN_UID_EMAIL) return alert('Este e-mail já é o administrador');

  const modulos = perfil === 'started'
    ? Array.from(document.querySelectorAll('.mod-check:checked')).map(c => c.value)
    : Object.keys(MODULOS_LABELS);

  if (perfil === 'started' && !modulos.length) return alert('Selecione ao menos um módulo');

  // Check if already exists
  const existing = await getDocs(query(collection(db,'usuarios'), where('email','==',email)));
  if (!existing.empty) return alert('Este usuário já está cadastrado');

  await addDoc(collection(db,'usuarios'), {
    email, perfil, modulos,
    owner_uid: uid(),
    created_at: serverTimestamp()
  });

  await pgAcessos();
};

window.editarModulos = async (id, email) => {
  const snap = await getDoc(doc(db,'usuarios',id));
  const atual = snap.data().modulos || [];
  const MODS = Object.keys(MODULOS_LABELS);

  const wrap = document.getElementById('started-form-wrap');
  wrap.innerHTML =
    '<div class="form-wrap" style="margin-bottom:16px;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
        '<span style="font-size:15px;font-weight:500;color:#fff;">Editar módulos — ' + email + '</span>' +
        '<button class="btn-close" onclick="document.getElementById(\'started-form-wrap\').innerHTML=\'\'">×</button>' +
      '</div>' +
      '<div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;">' +
        MODS.map(m => '<label style="display:flex;align-items:center;gap:6px;font-size:12px;color:#8B949E;cursor:pointer;background:#161B22;border:0.5px solid #21262D;border-radius:7px;padding:6px 12px;">' +
          '<input type="checkbox" value="' + m + '" class="mod-check-edit" ' + (atual.includes(m)?'checked':'') + ' style="accent-color:#30363D;"> ' + MODULOS_LABELS[m] + '</label>').join('') +
      '</div>' +
      '<div class="form-actions">' +
        '<button class="btn-secondary" onclick="document.getElementById(\'started-form-wrap\').innerHTML=\'\'">Cancelar</button>' +
        '<button class="btn-primary" onclick="window.salvarModulos(\'' + id + '\')">Salvar</button>' +
      '</div>' +
    '</div>';
};

window.salvarModulos = async (id) => {
  const modulos = Array.from(document.querySelectorAll('.mod-check-edit:checked')).map(c => c.value);
  if (!modulos.length) return alert('Selecione ao menos um módulo');
  await updateDoc(doc(db,'usuarios',id), {modulos});
  await pgAcessos();
};

window.removerUsuario = async (id) => {
  if (!confirm('Remover este usuário?')) return;
  await deleteDoc(doc(db,'usuarios',id));
  await pgAcessos();
};

// ══ SUPORTE ══
const ADMIN_EMAIL = 'ana.beatriz.sava@gmail.com';
const suporteCol = () => collection(db, 'suporte');

const TIPO_LABELS = { melhoria: 'Melhoria', bug: 'Bug' };
const TIPO_BADGE = { melhoria: 'background:#1C2333;color:#8B949E', bug: 'background:#2A1014;color:#9A4A53' };
const STATUS_LABELS = { aberta: 'Aberta', analise: 'Em análise', resolvida: 'Resolvida' };
const STATUS_BADGE = {
  aberta: 'background:#2A1C0A;color:#8C603E',
  analise: 'background:#1C2333;color:#8B949E',
  resolvida: 'background:#1A2820;color:#3FB950'
};

const ATU_TIPO_LABEL = { funcionalidade:'Nova funcionalidade', correcao:'Correção', informativo:'Informativo' };
const ATU_TIPO_BADGE = {
  funcionalidade: 'background:#0F6E56;color:#9FE1CB',
  correcao:       'background:#1C2333;color:#8B949E',
  informativo:    'background:#2A1C0A;color:#8C603E'
};
const ATU_DOT = { funcionalidade:'#1D9E75', correcao:'#8B949E', informativo:'#8C603E' };

let suporteAba = 'demandas';
let suporteFiltro = 'abertas';

async function pgSuporte(aba) {
  setPage('suporte');
  if (aba) suporteAba = aba;
  const isAdmin = currentUser.email === ADMIN_EMAIL;

  // Carregar tickets + atualizações em paralelo
  let q = isAdmin
    ? query(suporteCol(), orderBy('created_at','desc'))
    : query(suporteCol(), where('user_email','==',currentUser.email), orderBy('created_at','desc'));

  const [ticketSnap, atuSnap] = await Promise.all([
    getDocs(q),
    getDocs(query(collection(db,'atualizacoes_sistema'), orderBy('created_at','desc')))
  ]);

  const tickets = ticketSnap.docs.map(d => ({id:d.id,...d.data()}));
  const atualizacoes = atuSnap.docs.map(d => ({id:d.id,...d.data()}));
  const pendentes = tickets.filter(t => t.status !== 'resolvida').length;

  // ── HEADER ──
  let html = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">' +
    '<div><div class="page-title">Suporte</div><div class="page-sub">' +
      (isAdmin ? 'Painel administrativo' : 'Suas demandas de suporte') +
    '</div></div>' +
    (!isAdmin ? '<button class="btn-primary" onclick="window.showTicketForm()">+ Nova demanda</button>' : '') +
  '</div>';

  // ── ABAS (só admin) ──
  if (isAdmin) {
    html += '<div style="display:flex;gap:0;border-bottom:0.5px solid #21262D;margin-bottom:20px;">' +
      '<div onclick="window.pgSuporte(\'demandas\')" style="padding:9px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid ' + (suporteAba==='demandas'?'#1D9E75':'transparent') + ';color:' + (suporteAba==='demandas'?'#fff':'#484F58') + ';margin-bottom:-0.5px;white-space:nowrap;">' +
        'Demandas' + (pendentes ? ' <span style="background:#2A1C0A;color:#8C603E;border-radius:999px;padding:1px 6px;font-size:10px;">' + pendentes + '</span>' : '') +
      '</div>' +
      '<div onclick="window.pgSuporte(\'atualizacoes\')" style="padding:9px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid ' + (suporteAba==='atualizacoes'?'#1D9E75':'transparent') + ';color:' + (suporteAba==='atualizacoes'?'#fff':'#484F58') + ';margin-bottom:-0.5px;white-space:nowrap;">' +
        'Atualizações do sistema' +
      '</div>' +
    '</div>';
  }

  // ══ ABA ATUALIZAÇÕES ══
  if (isAdmin && suporteAba === 'atualizacoes') {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">' +
      '<span style="font-size:13px;color:#8B949E;">' + atualizacoes.length + ' publicação' + (atualizacoes.length!==1?'s':'') + '</span>' +
      '<button onclick="window.showAtuForm()" class="btn-primary btn-sm">+ Publicar atualização</button>' +
    '</div>' +
    '<div id="atu-form-wrap"></div>';

    if (!atualizacoes.length) {
      html += '<div class="card"><div class="empty-state">Nenhuma atualização publicada ainda</div></div>';
    } else {
      atualizacoes.forEach(a => {
        const dataFmt = a.created_at?.toDate ? a.created_at.toDate().toLocaleDateString('pt-BR') : '—';
        html += '<div class="card" style="padding:0;margin-bottom:10px;overflow:hidden;">' +
          '<div style="display:flex;">' +
            '<div style="width:3px;background:' + (ATU_DOT[a.tipo]||'#30363D') + ';flex-shrink:0;"></div>' +
            '<div style="flex:1;padding:14px 16px;">' +
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">' +
                '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
                  '<span style="font-size:13px;font-weight:500;color:#fff;">' + (a.titulo||'Sem título') + '</span>' +
                  '<span style="font-size:10px;padding:2px 8px;border-radius:999px;' + (ATU_TIPO_BADGE[a.tipo]||'') + '">' + (ATU_TIPO_LABEL[a.tipo]||a.tipo) + '</span>' +
                  '<span style="font-size:10px;color:#484F58;">' + dataFmt + '</span>' +
                '</div>' +
                '<button onclick="window.delAtu(\'' + a.id + '\')" style="background:transparent;border:none;color:#484F58;font-size:16px;cursor:pointer;padding:0 2px;">×</button>' +
              '</div>' +
              '<div style="font-size:13px;color:#8B949E;line-height:1.6;">' + (a.descricao||'').replace(/\n/g,'<br>') + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      });
    }
    document.getElementById('content').innerHTML = html;
    return;
  }

  // ══ ABA DEMANDAS ══

  // Alerta de pendentes (admin)
  if (isAdmin && pendentes > 0) {
    html += '<div style="background:#2A1C0A;border:0.5px solid #3D2A0A;border-radius:9px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;">' +
      '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 2L14 13H2L8 2Z" stroke="#8C603E" stroke-width="1.2" stroke-linejoin="round"/><line x1="8" y1="6.5" x2="8" y2="9.5" stroke="#8C603E" stroke-width="1.2"/><circle cx="8" cy="11" r="0.7" fill="#8C603E"/></svg>' +
      '<span style="font-size:12px;color:#8C603E;">' + pendentes + ' demanda' + (pendentes!==1?'s':'') + ' pendente' + (pendentes!==1?'s':'') + ' aguardando atenção</span>' +
    '</div>';
  }

  // Filtros (só admin)
  if (isAdmin) {
    const filtros = [
      ['abertas','Abertas'], ['analise','Em análise'], ['resolvida','Resolvidas'],
      ['bug','Bugs'], ['melhoria','Melhorias'], ['todas','Todas']
    ];
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">';
    filtros.forEach(([val, label]) => {
      const ativo = suporteFiltro === val;
      html += '<button onclick="window.setSuporteFiltro(\'' + val + '\')" style="background:' + (ativo?'#21262D':'transparent') + ';border:0.5px solid ' + (ativo?'#444':'#21262D') + ';border-radius:999px;padding:4px 12px;font-size:11px;color:' + (ativo?'#fff':'#484F58') + ';cursor:pointer;">' + label + '</button>';
    });
    html += '</div>';
  }

  html += '<div id="ticket-form-wrap"></div>';

  // Aplicar filtro
  const filtrados = isAdmin ? tickets.filter(t => {
    if (suporteFiltro === 'todas') return true;
    if (suporteFiltro === 'abertas') return t.status !== 'resolvida';
    if (suporteFiltro === 'bug' || suporteFiltro === 'melhoria') return t.tipo === suporteFiltro;
    return t.status === suporteFiltro;
  }) : tickets;

  if (!filtrados.length) {
    html += '<div class="card"><div class="empty-state">' +
      (isAdmin ? 'Nenhuma demanda encontrada' : 'Você não tem demandas abertas<br><small style="color:#30363D;margin-top:6px;display:block;">Clique em "+ Nova demanda" para reportar um problema ou sugerir uma melhoria</small>') +
    '</div></div>';
  } else {
    // Separar abertas/análise das resolvidas
    const ativas = filtrados.filter(t => t.status !== 'resolvida');
    const resolvidas = filtrados.filter(t => t.status === 'resolvida');

    const renderTicket = (t, colapsado) => {
      const dataFmt = t.created_at?.toDate ? t.created_at.toDate().toLocaleDateString('pt-BR') : '—';
      const dataRes = t.resolved_at?.toDate ? t.resolved_at.toDate().toLocaleDateString('pt-BR') : null;
      if (colapsado) {
        // Resolvidas: linha compacta colapsada
        return '<div class="card" style="padding:10px 14px;margin-bottom:6px;opacity:0.55;display:flex;align-items:center;gap:10px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<span style="font-size:12px;color:#fff;">' + t.titulo + '</span>' +
            (isAdmin ? '<span style="font-size:11px;color:#484F58;margin-left:8px;">' + t.user_email + '</span>' : '') +
          '</div>' +
          '<span style="font-size:10px;padding:2px 8px;border-radius:999px;' + (TIPO_BADGE[t.tipo]||'') + '">' + (TIPO_LABELS[t.tipo]||t.tipo) + '</span>' +
          '<span style="font-size:10px;color:#3FB950;">✓ ' + (dataRes||dataFmt) + '</span>' +
        '</div>';
      }
      return '<div class="card" style="padding:16px 18px;margin-bottom:10px;">' +
        '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">' +
              '<span style="font-size:14px;font-weight:500;color:#fff;">' + t.titulo + '</span>' +
              '<span style="font-size:10px;padding:2px 8px;border-radius:999px;' + (TIPO_BADGE[t.tipo]||'') + '">' + (TIPO_LABELS[t.tipo]||t.tipo) + '</span>' +
              '<span style="font-size:10px;padding:2px 8px;border-radius:999px;' + (STATUS_BADGE[t.status]||'') + '">' + (STATUS_LABELS[t.status]||t.status) + '</span>' +
            '</div>' +
            (isAdmin ? '<div style="font-size:11px;color:#484F58;">Por: ' + t.user_email + ' · ' + dataFmt + '</div>' : '<div style="font-size:11px;color:#484F58;">Aberta em ' + dataFmt + '</div>') +
          '</div>' +
          (isAdmin && t.status !== 'resolvida' ? '<div style="display:flex;gap:6px;flex-shrink:0;margin-left:12px;">' +
            (t.status === 'aberta' ? '<button onclick="window.avancarTicket(\'' + t.id + '\',\'analise\')" class="btn-secondary btn-sm">Em análise</button>' : '') +
            '<button onclick="window.resolverTicket(\'' + t.id + '\')" style="background:#1A2820;border:0.5px solid #2E4030;border-radius:7px;padding:6px 12px;font-size:12px;color:#3FB950;cursor:pointer;">Resolver</button>' +
          '</div>' : '') +
        '</div>' +
        '<div style="font-size:13px;color:#8B949E;line-height:1.6;">' + t.descricao + '</div>' +
        (t.resposta ? '<div style="background:#161B22;border:0.5px solid #21262D;border-radius:8px;padding:10px 14px;margin-top:10px;">' +
          '<div style="font-size:10px;color:#484F58;margin-bottom:4px;">Resposta do suporte' + (dataRes?' · '+dataRes:'') + '</div>' +
          '<div style="font-size:13px;color:#fff;">' + t.resposta + '</div>' +
        '</div>' : '') +
      '</div>';
    };

    ativas.forEach(t => { html += renderTicket(t, false); });

    if (resolvidas.length) {
      html += '<div style="font-size:11px;color:#484F58;margin:16px 0 8px;letter-spacing:0.04em;">RESOLVIDAS (' + resolvidas.length + ')</div>';
      resolvidas.forEach(t => { html += renderTicket(t, true); });
    }
  }

  document.getElementById('content').innerHTML = html;
}

window.pgSuporte = pgSuporte;

window.setSuporteFiltro = (filtro) => {
  suporteFiltro = filtro;
  pgSuporte('demandas');
};

window.salvarAtu = async () => {
  const titulo = document.getElementById('atu-titulo').value.trim();
  const desc = document.getElementById('atu-desc').value.trim();
  if (!titulo) return alert('Título obrigatório');
  if (!desc) return alert('Descrição obrigatória');

  await addDoc(collection(db,'atualizacoes_sistema'), {
    tipo: document.getElementById('atu-tipo').value,
    titulo, descricao: desc,
    created_at: serverTimestamp()
  });

  // Notificar TODOS os usuários no sininho
  const usersSnap = await getDocs(collection(db,'usuarios'));
  const notifPromises = usersSnap.docs.map(u => addDoc(collection(db,'notificacoes'), {
    para: u.data().email,
    tipo: 'atualizacao_sistema',
    texto: 'Nova atualização do sistema: ' + titulo,
    lida: false,
    created_at: serverTimestamp()
  }));
  await Promise.all(notifPromises);

  pgSuporte('atualizacoes');
};

window.delAtu = async (id) => {
  if (!confirm('Excluir esta atualização?')) return;
  await deleteDoc(doc(db,'atualizacoes_sistema',id));
  pgSuporte('atualizacoes');
};

          '</select>' +

window.salvarTicket = async () => {
  const titulo = document.getElementById('tk-titulo').value.trim();
  const desc = document.getElementById('tk-desc').value.trim();
  if (!titulo) return alert('Título obrigatório');
  if (!desc) return alert('Descrição obrigatória');
  await addDoc(suporteCol(), {
    titulo, descricao: desc,
    tipo: document.getElementById('tk-tipo').value,
    status: 'aberta',
    user_email: currentUser.email,
    user_uid: uid(),
    created_at: serverTimestamp()
  });
  await addDoc(collection(db,'notificacoes'), {
    para: ADMIN_EMAIL, tipo: 'suporte',
    texto: 'Nova demanda de ' + currentUser.email + ': ' + titulo,
    lida: false, created_at: serverTimestamp()
  });
  await pgSuporte('demandas');
};

window.avancarTicket = async (id, novoStatus) => {
  await updateDoc(doc(db,'suporte',id), { status: novoStatus });
  await pgSuporte('demandas');
};

window.resolverTicket = async (id) => {
  const resposta = prompt('Digite a resposta/resolução para o usuário:');
  if (!resposta) return;
  const tSnap = await getDoc(doc(db,'suporte',id));
  const ticket = tSnap.data();
  await updateDoc(doc(db,'suporte',id), { status:'resolvida', resposta, resolved_at: serverTimestamp() });
  await addDoc(collection(db,'notificacoes'), {
    para: ticket.user_email, tipo: 'suporte_resolvido',
    texto: 'Sua demanda "' + ticket.titulo + '" foi resolvida!',
    lida: false, created_at: serverTimestamp()
  });
  await pgSuporte('demandas');
};



// ── BOTTOM NAV MOBILE ──
window.bnNav = (page) => {
  window.closeSheet();
  // Update active state
  document.querySelectorAll('.bn-item').forEach(i => i.classList.remove('active'));
  const target = document.querySelector('.bn-item[data-bn="' + page + '"]');
  if (target) target.classList.add('active');
  // Also sync desktop sidebar
  document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
  obraAberta = null;
  renderPage(page);
  // Scroll to top
  document.getElementById('content').scrollTop = 0;
};

window.toggleSheet = () => {
  const drawer = document.getElementById('more-drawer');
  const overlay = document.getElementById('sheet-overlay');
  if (!drawer) return;
  const isOpen = drawer.style.display === 'block';
  drawer.style.display = isOpen ? 'none' : 'block';
  if (overlay) overlay.style.display = isOpen ? 'none' : 'block';
  const moreBtn = document.getElementById('bn-more');
  if (moreBtn) moreBtn.classList.toggle('active', !isOpen);
};
window.closeSheet = () => {
  const drawer = document.getElementById('more-drawer');
  const overlay = document.getElementById('sheet-overlay');
  if (drawer) drawer.style.display = 'none';
  if (overlay) overlay.style.display = 'none';
  const moreBtn = document.getElementById('bn-more');
  if (moreBtn) moreBtn.classList.remove('active');
};

// Sync bottom nav when desktop sidebar is clicked
document.querySelectorAll('.nav-item[data-page]').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.bn-item').forEach(i => i.classList.remove('active'));
    const target = document.querySelector('.bn-item[data-bn="' + item.dataset.page + '"]');
    if (target) target.classList.add('active');
  });
});


// ── MOBILE LAYOUT FIX ──
// CSS @media handles all layout. JS only adjusts paddingBottom on content.
function applyMobileLayout() {
  const isMobile = window.innerWidth <= 768;
  const ct = document.getElementById('content');
  if (!ct) return;
  if (isMobile) {
    ct.style.paddingBottom = '72px';
  } else {
    ct.style.paddingBottom = '';
  }
}
applyMobileLayout();
window.addEventListener('resize', applyMobileLayout);
window.addEventListener('orientationchange', () => setTimeout(applyMobileLayout, 300));

</script>
