<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ObraFácil</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
#app{width:100%;height:100%;background:#16161A;color:#D3D1C7;}
#login-screen{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;}
.login-logo{width:10px;height:10px;border-radius:50%;background:#7F77DD;}
.login-title{font-size:24px;font-weight:500;color:#fff;}
.login-sub{font-size:14px;color:#5F5E5A;}
.btn-google{background:#534AB7;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:14px;cursor:pointer;margin-top:8px;}
#main-layout{display:flex;flex-direction:column;height:100%;}
.topbar{background:#1E1E24;border-bottom:0.5px solid #2E2E38;padding:0 20px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-logo{display:flex;align-items:center;gap:8px;}
.topbar-dot{width:8px;height:8px;border-radius:50%;background:#7F77DD;}
.topbar-name{font-size:15px;font-weight:500;color:#fff;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-email{font-size:12px;color:#5F5E5A;}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:#3C3089;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#CECBF6;cursor:pointer;}
.body-wrap{display:flex;flex:1;overflow:hidden;}
.sidebar{width:200px;min-width:200px;background:#1E1E24;border-right:0.5px solid #2E2E38;overflow-y:auto;flex-shrink:0;padding:8px 0;}
.nav-section{font-size:10px;color:#5F5E5A;padding:12px 16px 4px;letter-spacing:0.06em;text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:13px;color:#888780;cursor:pointer;}
.nav-item:hover{background:#1a1a22;}
.nav-item.active{background:#26215C;color:#AFA9EC;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#333;flex-shrink:0;}
.nav-item.active .nav-dot{background:#7F77DD;}
.content{flex:1;overflow-y:auto;padding:24px 28px;}
.page-title{font-size:18px;font-weight:500;color:#fff;}
.page-sub{font-size:12px;color:#5F5E5A;margin-top:4px;}
.btn-primary{background:#534AB7;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;}
.btn-secondary{background:transparent;border:0.5px solid #2E2E38;border-radius:8px;padding:9px 18px;font-size:13px;color:#888780;cursor:pointer;}
.btn-sm{padding:6px 12px!important;font-size:12px!important;border-radius:7px!important;}
.btn-xs{padding:5px 10px!important;font-size:11px!important;border-radius:6px!important;}
.card{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:12px;padding:16px 18px;margin-bottom:10px;}
.empty-state{text-align:center;padding:48px 24px;color:#444441;font-size:14px;}
.form-wrap{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:12px;padding:24px;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:12px;color:#888780;}
.form-input{width:100%;background:#16161A;border:0.5px solid #2E2E38;border-radius:8px;padding:8px 11px;font-size:13px;color:#D3D1C7;outline:none;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-close{background:transparent;border:none;color:#5F5E5A;font-size:20px;cursor:pointer;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:999px;}
.badge-planejamento{background:#26215C;color:#AFA9EC;}
.badge-andamento{background:#0F3D2E;color:#5DCAA5;}
.badge-pausada{background:#3D3000;color:#FAC775;}
.badge-concluida{background:#1A0A0A;color:#F09595;}
.back-btn{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:8px;padding:6px 14px;font-size:12px;color:#888780;cursor:pointer;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px;}
.info-card{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:10px;padding:12px 14px;}
.info-label{font-size:11px;color:#5F5E5A;margin-bottom:4px;}
.info-value{font-size:13px;font-weight:500;color:#D3D1C7;}
.etapa-card{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:10px;overflow:hidden;margin-bottom:10px;}
.tarefa-row{padding:10px 16px;display:flex;align-items:center;gap:12px;border-top:0.5px solid #2E2E38;}
.tarefa-check{width:16px;height:16px;border-radius:4px;border:0.5px solid #444441;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.tarefa-check.done{background:#1D9E75;border-color:#1D9E75;}
.sub-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sub-title{font-size:14px;font-weight:500;color:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:24px;}
.stat-card{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:10px;padding:14px 16px;}
.stat-val{font-size:22px;font-weight:500;color:#fff;}
.stat-lbl{font-size:11px;color:#5F5E5A;margin-top:3px;}
.stat-tag{font-size:10px;padding:2px 7px;border-radius:999px;margin-top:6px;display:inline-block;}
.tag-ok{background:#085041;color:#9FE1CB;}
.tag-warn{background:#633806;color:#FAC775;}
.tag-info{background:#26215C;color:#AFA9EC;}
.wip{background:#1E1E24;border:0.5px solid #2E2E38;border-radius:12px;padding:48px;text-align:center;color:#444441;font-size:14px;}
.loading{color:#5F5E5A;font-size:13px;padding:24px 0;}
</style>
</head>
<body>
<div id="app">
  <div id="login-screen" style="display:none;">
    <div class="login-logo"></div>
    <div class="login-title">ObraFácil</div>
    <div class="login-sub">Gestão de obras e reformas</div>
    <button class="btn-google" onclick="window.doLogin()">Entrar com Google</button>
  </div>
  <div id="main-layout" style="display:none;">
    <div class="topbar">
      <div class="topbar-logo"><div class="topbar-dot"></div><span class="topbar-name">ObraFácil</span></div>
      <div class="topbar-right">
        <span class="topbar-email" id="user-email"></span>
        <div class="topbar-avatar" id="user-avatar" onclick="window.doLogout()" title="Sair"></div>
      </div>
    </div>
    <div class="body-wrap">
      <div class="sidebar">
        <div class="nav-section">Principal</div>
        <div class="nav-item active" data-page="dashboard"><div class="nav-dot"></div>Dashboard</div>
        <div class="nav-item" data-page="obras"><div class="nav-dot"></div>Obras</div>
        <div class="nav-section">Gestão</div>
        <div class="nav-item" data-page="financeiro"><div class="nav-dot"></div>Financeiro</div>
        <div class="nav-item" data-page="materiais"><div class="nav-dot"></div>Materiais</div>
        <div class="nav-item" data-page="equipe"><div class="nav-dot"></div>Equipe</div>
        <div class="nav-section">Registro</div>
        <div class="nav-item" data-page="diario"><div class="nav-dot"></div>Diário de obra</div>
        <div class="nav-item" data-page="documentos"><div class="nav-dot"></div>Documentos</div>
        <div class="nav-item" data-page="operacional"><div class="nav-dot"></div>Operacional</div>
        <div class="nav-section">Config</div>
        <div class="nav-item" data-page="acessos"><div class="nav-dot"></div>Acessos</div>
      </div>
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, getDoc, getDocs, deleteDoc, updateDoc, query, where, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAduXAqG6vRTI6STlFD3psMWkYY-DbXBr8",
  authDomain: "my-calendar-ccfd0.firebaseapp.com",
  projectId: "my-calendar-ccfd0",
  storageBucket: "my-calendar-ccfd0.firebasestorage.app",
  messagingSenderId: "124871692654",
  appId: "1:124871692654:web:4c8a914cbcaea6167a317f"
};

const fbApp = initializeApp(firebaseConfig, 'obra-facil');
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

let currentUser = null;
let obraAberta = null;

window.doLogin = () => signInWithPopup(auth, provider).catch(e => alert('Erro: ' + e.message));
window.doLogout = () => { if(confirm('Sair?')) signOut(auth); };

onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-layout').style.display = 'flex';
    document.getElementById('user-email').textContent = user.email;
    document.getElementById('user-avatar').textContent = user.email.substring(0,2).toUpperCase();
    renderPage('dashboard');
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-layout').style.display = 'none';
  }
});

document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    obraAberta = null;
    renderPage(item.dataset.page);
  });
});

function setPage(p) { document.querySelectorAll('.nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === p)); }

const uid = () => currentUser.uid;
const obrasCol = () => collection(db, 'obras');
const obraRef = (id) => doc(db, 'obras', id);
const sub = (obraId, name) => collection(db, 'obras', obraId, name);
const fmtR = v => v ? new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v) : '—';
const fmtD = d => d ? new Date(d+'T00:00:00').toLocaleDateString('pt-BR') : '—';
const SL = {planejamento:'Planejamento', andamento:'Em andamento', pausada:'Pausada', concluida:'Concluída'};
const TIPOS = ['Residencial','Comercial','Industrial','Reforma','Outro'];

async function renderPage(page) {
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  if (page === 'dashboard') await pgDash();
  else if (page === 'obras') obraAberta ? await pgDetalhe() : await pgObras();
  else if (page === 'financeiro') await pgFin();
  else if (page === 'materiais') await pgMateriais();
  else if (page === 'equipe') await pgEquipe();
  else if (page === 'diario') await pgDiario();
  else if (page === 'documentos') await pgDocumentos();
  else if (page === 'operacional') await pgOperacional();
  else el.innerHTML = '<div class="wip">Módulo em construção</div>';
}

// ══ DASHBOARD ══
async function pgDash() {
  const snap = await getDocs(query(obrasCol(), where('uid','==',uid())));
  const obras = snap.docs.map(d => ({id:d.id,...d.data()}));
  const totOrc = obras.reduce((s,o) => s+(parseFloat(o.valor_orcado)||0), 0);
  const emAnd = obras.filter(o => o.status==='andamento').length;
  const atras = obras.filter(o => o.status==='andamento' && o.data_prevista_fim && new Date(o.data_prevista_fim) < new Date()).length;
  const recentes = obras.slice(0,3);
  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;">
    <div><div class="page-title">Dashboard</div><div class="page-sub">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">${obras.length}</div><div class="stat-lbl">Obras cadastradas</div><span class="stat-tag tag-info">${emAnd} em andamento</span></div>
    <div class="stat-card"><div class="stat-val">${fmtR(totOrc)}</div><div class="stat-lbl">Total orçado</div></div>
    <div class="stat-card"><div class="stat-val">${atras}</div><div class="stat-lbl">Atrasadas</div><span class="stat-tag ${atras>0?'tag-warn':'tag-ok'}">${atras>0?'atenção':'em dia'}</span></div>
  </div>
  <div class="sub-header"><span class="sub-title">Obras recentes</span><span style="font-size:12px;color:#7F77DD;cursor:pointer;" onclick="window.goObras()">Ver todas</span></div>`;
  if (!recentes.length) html += '<div class="card"><div class="empty-state">Nenhuma obra ainda</div></div>';
  else recentes.forEach(o => {
    html += `<div class="card" style="display:flex;align-items:center;gap:12px;cursor:pointer;" onclick="window.abrirObra('${o.id}')">
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><span style="font-size:14px;font-weight:500;color:#fff;">${o.nome}</span><span class="badge badge-${o.status}">${SL[o.status]||o.status}</span></div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;">
          ${o.nome_cliente?`<span style="font-size:12px;color:#5F5E5A;">Cliente: ${o.nome_cliente}</span>`:''}
          ${o.data_prevista_fim?`<span style="font-size:12px;color:#5F5E5A;">Término: ${fmtD(o.data_prevista_fim)}</span>`:''}
        </div>
      </div>
    </div>`;
  });
  document.getElementById('content').innerHTML = html;
}
window.goObras = () => { setPage('obras'); obraAberta=null; renderPage('obras'); };

// ══ OBRAS ══
async function pgObras() {
  setPage('obras');
  const snap = await getDocs(query(obrasCol(), where('uid','==',uid())));
  const obras = snap.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => (b.created_at?.seconds||0)-(a.created_at?.seconds||0));
  let html = `<div style="display:flex;justify-content:space-between;margin-bottom:20px;">
    <div><div class="page-title">Obras</div><div class="page-sub">${obras.length} obra${obras.length!==1?'s':''} cadastrada${obras.length!==1?'s':''}</div></div>
    <button class="btn-primary" onclick="window.showObraForm()">+ Nova obra</button>
  </div>
  <div id="obra-form-wrap"></div>
  <div id="obras-list">`;
  if (!obras.length) html += '<div class="card"><div class="empty-state">Nenhuma obra cadastrada<br><small style="color:#333;margin-top:6px;display:block;">Clique em "+ Nova obra" para começar</small></div></div>';
  else obras.forEach(o => {
    html += `<div class="card" style="display:flex;align-items:center;gap:16px;">
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><span style="font-size:14px;font-weight:500;color:#fff;">${o.nome}</span><span class="badge badge-${o.status}">${SL[o.status]||o.status}</span></div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;">
          ${o.nome_cliente?`<span style="font-size:12px;color:#5F5E5A;">Cliente: ${o.nome_cliente}</span>`:''}
          ${o.tipo?`<span style="font-size:12px;color:#5F5E5A;">${o.tipo}</span>`:''}
          ${o.data_prevista_fim?`<span style="font-size:12px;color:#5F5E5A;">Término: ${fmtD(o.data_prevista_fim)}</span>`:''}
          ${o.valor_orcado?`<span style="font-size:12px;color:#5F5E5A;">${fmtR(o.valor_orcado)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="btn-primary btn-sm" onclick="window.abrirObra('${o.id}')">Ver</button>
        <button class="btn-secondary btn-sm" onclick="window.deletarObra('${o.id}')">Excluir</button>
      </div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function obraFormHTML(dados, titulo, onSave) {
  const d = dados || {};
  return `<div class="form-wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <span style="font-size:15px;font-weight:500;color:#fff;">${titulo}</span>
      <button class="btn-close" onclick="document.getElementById('obra-form-wrap').innerHTML=''">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group form-full"><label class="form-label">Nome da obra *</label><input class="form-input" id="of-nome" value="${d.nome||''}" placeholder="Ex: Residência Silva"></div>
      <div class="form-group"><label class="form-label">Tipo</label><select class="form-input" id="of-tipo"><option value="">Selecionar</option>${TIPOS.map(t=>`<option value="${t}"${d.tipo===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Status</label><select class="form-input" id="of-status">${Object.entries(SL).map(([k,v])=>`<option value="${k}"${(d.status||'planejamento')===k?' selected':''}>${v}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Data de início</label><input type="date" class="form-input" id="of-inicio" value="${d.data_inicio||''}"></div>
      <div class="form-group"><label class="form-label">Previsão de término</label><input type="date" class="form-input" id="of-fim" value="${d.data_prevista_fim||''}"></div>
      <div class="form-group"><label class="form-label">Nome do cliente</label><input class="form-input" id="of-cliente" value="${d.nome_cliente||''}" placeholder="Nome completo"></div>
      <div class="form-group"><label class="form-label">Contato do cliente</label><input class="form-input" id="of-contato" value="${d.contato_cliente||''}" placeholder="(11) 99999-9999"></div>
      <div class="form-group"><label class="form-label">Valor orçado (R$)</label><input type="number" class="form-input" id="of-valor" value="${d.valor_orcado||''}" placeholder="0,00"></div>
      <div class="form-group"><label class="form-label">Responsável técnico</label><input class="form-input" id="of-resp" value="${d.responsavel_tecnico||''}" placeholder="Nome"></div>
      <div class="form-group form-full"><label class="form-label">Endereço</label><input class="form-input" id="of-end" value="${d.endereco||''}" placeholder="Rua, número, bairro, cidade"></div>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="document.getElementById('obra-form-wrap').innerHTML=''">Cancelar</button>
      <button class="btn-primary" onclick="${onSave}">Salvar obra</button>
    </div>
  </div>`;
}

function getObraForm() {
  return {
    nome: document.getElementById('of-nome').value.trim(),
    tipo: document.getElementById('of-tipo').value,
    status: document.getElementById('of-status').value,
    data_inicio: document.getElementById('of-inicio').value,
    data_prevista_fim: document.getElementById('of-fim').value,
    nome_cliente: document.getElementById('of-cliente').value,
    contato_cliente: document.getElementById('of-contato').value,
    valor_orcado: parseFloat(document.getElementById('of-valor').value)||null,
    responsavel_tecnico: document.getElementById('of-resp').value,
    endereco: document.getElementById('of-end').value,
  };
}

window.showObraForm = () => {
  document.getElementById('obra-form-wrap').innerHTML = obraFormHTML(null, 'Nova obra', 'window.salvarObra()');
};

window.salvarObra = async () => {
  const d = getObraForm();
  if (!d.nome) return alert('Nome obrigatório');
  await addDoc(obrasCol(), {...d, uid: uid(), created_at: serverTimestamp()});
  await pgObras();
};

window.deletarObra = async (id) => {
  if (!confirm('Excluir esta obra?')) return;
  await deleteDoc(obraRef(id));
  await pgObras();
};

window.abrirObra = async (id) => {
  const snap = await getDoc(obraRef(id));
  obraAberta = {id, ...snap.data()};
  setPage('obras');
  await pgDetalhe();
};

// ══ OBRA DETALHE ══
async function pgDetalhe() {
  const o = obraAberta;
  const [etSnap, tSnap] = await Promise.all([
    getDocs(query(sub(o.id,'etapas'), orderBy('ordem'))),
    getDocs(sub(o.id,'tarefas'))
  ]);
  const etapas = etSnap.docs.map(d => ({id:d.id,...d.data()}));
  const tarefas = tSnap.docs.map(d => ({id:d.id,...d.data()}));

  let html = `<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
    <button class="back-btn" onclick="window.voltarObras()">← Voltar</button>
    <span class="page-title">${o.nome}</span>
    <span class="badge badge-${o.status}">${SL[o.status]||o.status}</span>
    <button class="btn-secondary btn-sm" onclick="window.editarObra()">Editar</button>
  </div>
  <div id="obra-form-wrap"></div>
  <div class="info-grid">
    ${[['Cliente',o.nome_cliente||'—'],['Tipo',o.tipo||'—'],['Início',fmtD(o.data_inicio)],['Previsão fim',fmtD(o.data_prevista_fim)],['Orçamento',fmtR(o.valor_orcado)],['Responsável',o.responsavel_tecnico||'—']].map(([l,v])=>`<div class="info-card"><div class="info-label">${l}</div><div class="info-value">${v}</div></div>`).join('')}
  </div>
  ${o.endereco?`<div class="card" style="padding:12px 14px;margin-bottom:16px;"><div class="info-label">Endereço</div><div style="font-size:13px;color:#D3D1C7;margin-top:4px;">${o.endereco}</div></div>`:''}
  <div class="sub-header"><span class="sub-title">Etapas e tarefas</span><button class="btn-primary btn-sm" onclick="window.showEtapaForm()">+ Nova etapa</button></div>
  <div id="etapa-form-wrap"></div>
  <div id="etapas-list">`;

  if (!etapas.length) html += '<div class="card"><div class="empty-state">Nenhuma etapa cadastrada</div></div>';
  else etapas.forEach(et => {
    const ets = tarefas.filter(t => t.etapa_id===et.id);
    const done = ets.filter(t => t.status==='concluida').length;
    const pct = ets.length ? Math.round((done/ets.length)*100) : 0;
    html += `<div class="etapa-card">
      <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;color:#fff;">${et.nome}</div>
          <div style="font-size:11px;color:#5F5E5A;margin-top:2px;">${ets.length?`${done}/${ets.length} tarefas · ${pct}%`:'Sem tarefas'}${et.data_prevista_fim?` · Fim: ${fmtD(et.data_prevista_fim)}`:''}</div>
          ${ets.length?`<div style="margin-top:6px;height:3px;background:#2E2E38;border-radius:2px;overflow:hidden;"><div style="height:100%;width:${pct}%;background:#1D9E75;border-radius:2px;"></div></div>`:''}
        </div>
        <div style="display:flex;gap:6px;">
          <button class="btn-primary btn-xs" onclick="window.showTarefaForm('${et.id}')">+ Tarefa</button>
          <button class="btn-secondary btn-xs" onclick="window.delEtapa('${et.id}')">Excluir</button>
        </div>
      </div>
      <div id="tf-form-${et.id}"></div>`;
    ets.forEach(t => {
      html += `<div class="tarefa-row">
        <div class="tarefa-check ${t.status==='concluida'?'done':''}" onclick="window.togTarefa('${t.id}','${t.status}')">
          ${t.status==='concluida'?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="2,5 4,7.5 8,2.5" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
        </div>
        <div style="flex:1;">
          <div style="font-size:13px;color:${t.status==='concluida'?'#5F5E5A':'#D3D1C7'};text-decoration:${t.status==='concluida'?'line-through':'none'};">${t.nome}</div>
          <div style="display:flex;gap:10px;margin-top:2px;">
            ${t.responsavel?`<span style="font-size:11px;color:#5F5E5A;">${t.responsavel}</span>`:''}
            ${t.data_prevista?`<span style="font-size:11px;color:#5F5E5A;">${fmtD(t.data_prevista)}</span>`:''}
            ${t.prioridade&&t.prioridade!=='normal'?`<span style="font-size:11px;color:${t.prioridade==='urgente'?'#F09595':'#FAC775'};">${t.prioridade}</span>`:''}
          </div>
        </div>
        <button onclick="window.delTarefa('${t.id}')" style="background:transparent;border:none;color:#444441;font-size:16px;cursor:pointer;">×</button>
      </div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

  const totPagar = contas.filter(c=>c.tipo==='pagar').reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const totRec = contas.filter(c=>c.tipo==='receber').reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const totPago = contas.filter(c=>c.tipo==='pagar'&&c.status==='pago').reduce((s,c)=>s+(parseFloat(c.valor)||0),0);

  let orcList = orcs.length ? orcs.map(o=>`<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">

window.loadMat = async (oid) => {
  if (!oid) { document.getElementById('mat-body').innerHTML = ''; return; }
  document.getElementById('mat-body').innerHTML = '<div class="loading">Carregando...</div>';
  const snap = await getDocs(sub(oid,'materiais'));
  const mats = snap.docs.map(d => ({id:d.id,...d.data()}));
  const STATUS_MAT = {pendente:'Pendente', comprado:'Comprado', entregue:'Entregue'};
  const BADGE_MAT = {pendente:'badge-planejamento', comprado:'badge-pausada', entregue:'badge-andamento'};
  let list = '';
  if (!mats.length) {
    list = '<div class="card"><div class="empty-state">Nenhum material cadastrado</div></div>';
  } else {
    mats.forEach(m => {
      list += '<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">' +

window.loadOp = async (oid) => {
  if (!oid) { document.getElementById('op-body').innerHTML = ''; return; }
  document.getElementById('op-body').innerHTML = '<div class="loading">Carregando...</div>';
  const [insSnap, ncSnap] = await Promise.all([
    getDocs(sub(oid,'inspecoes')),
    getDocs(sub(oid,'nao_conformidades'))
  ]);
  const inspecoes = insSnap.docs.map(d => ({id:d.id,...d.data()}));
  const ncs = ncSnap.docs.map(d => ({id:d.id,...d.data()}));
  const abertas = ncs.filter(n => n.status==='aberta').length;

  let insList = '';
  if (!inspecoes.length) {
    insList = '<div class="card"><div class="empty-state">Nenhuma inspeção registrada</div></div>';
  } else {
    inspecoes.forEach(i => {
      insList += '<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">' +
        '<div style="flex:1;">' +
          '<div style="font-size:13px;font-weight:500;color:#fff;">' + (i.tipo||'Inspeção') + '</div>' +
          '<div style="font-size:11px;color:#5F5E5A;margin-top:2px;">' + (i.data?fmtD(i.data):'') + (i.responsavel?' · '+i.responsavel:'') + '</div>' +
          (i.observacao?'<div style="font-size:12px;color:#D3D1C7;margin-top:4px;">' + i.observacao + '</div>':'') +
        '</div>' +
        '<span class="badge ' + (i.resultado==='aprovado'?'badge-andamento':'badge-pausada') + '">' + (i.resultado==='aprovado'?'Aprovado':'Reprovado') + '</span>' +
        '<button onclick="window.delInsp(\'' + oid + '\',\'' + i.id + '\')" style="background:transparent;border:none;color:#444441;font-size:16px;cursor:pointer;">×</button>' +
      '</div>';
    });
  }

  let ncList = '';
  if (!ncs.length) {
    ncList = '<div class="card"><div class="empty-state">Nenhuma não conformidade registrada</div></div>';
  } else {
    ncs.forEach(n => {
      ncList += '<div class="card" style="display:flex;align-items:center;gap:12px;padding:12px 16px;">' +
        '<div style="flex:1;">' +
          '<div style="font-size:13px;font-weight:500;color:#fff;">' + n.descricao + '</div>' +
          '<div style="font-size:11px;color:#5F5E5A;margin-top:2px;">' + (n.responsavel?'Resp: '+n.responsavel:'') + (n.prazo?' · Prazo: '+fmtD(n.prazo):'') + '</div>' +
          (n.resolucao?'<div style="font-size:12px;color:#5DCAA5;margin-top:4px;">✓ ' + n.resolucao + '</div>':'') +
        '</div>' +
        '<span class="badge ' + (n.status==='resolvida'?'badge-andamento':n.status==='em_andamento'?'badge-pausada':'badge-planejamento') + '">' + (n.status==='resolvida'?'Resolvida':n.status==='em_andamento'?'Em andamento':'Aberta') + '</span>' +
        (n.status!=='resolvida'?'<button onclick="window.resolverNC(\'' + oid + '\',\'' + n.id + '\')" style="background:#0F3D2E;border:none;border-radius:6px;padding:4px 10px;font-size:11px;color:#5DCAA5;cursor:pointer;">Resolver</button>':'') +
        '<button onclick="window.delNC(\'' + oid + '\',\'' + n.id + '\')" style="background:transparent;border:none;color:#444441;font-size:16px;cursor:pointer;">×</button>' +
      '</div>';
    });
  }

  document.getElementById('op-body').innerHTML =
    '<div class="stats-grid" style="margin-bottom:20px;">' +
      '<div class="stat-card"><div class="stat-val">' + inspecoes.length + '</div><div class="stat-lbl">Inspeções</div><span class="stat-tag tag-ok">' + inspecoes.filter(i=>i.resultado==='aprovado').length + ' aprovadas</span></div>' +
      '<div class="stat-card"><div class="stat-val">' + ncs.length + '</div><div class="stat-lbl">Não conformidades</div><span class="stat-tag ' + (abertas>0?'tag-warn':'tag-ok') + '">' + abertas + ' abertas</span></div>' +
    '</div>' +
    '<div class="sub-header"><span class="sub-title">Inspeções de qualidade</span><button class="btn-primary btn-sm" onclick="window.showInspForm(\'' + oid + '\')">+ Inspeção</button></div>' +
    '<div id="insp-form"></div>' +
    '<div id="insp-list">' + insList + '</div>' +
    '<div class="sub-header" style="margin-top:24px;"><span class="sub-title">Não conformidades</span><button class="btn-primary btn-sm" onclick="window.showNCForm(\'' + oid + '\')">+ NC</button></div>' +
    '<div id="nc-form"></div>' +
    '<div id="nc-list">' + ncList + '</div>';
};

window.showInspForm = (oid) => {
  document.getElementById('insp-form').innerHTML =
    '<div class="form-wrap" style="margin-bottom:14px;">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span style="font-size:14px;font-weight:500;color:#fff;">Nova inspeção</span><button class="btn-close" onclick="document.getElementById(\'insp-form\').innerHTML=\'\'">×</button></div>' +
      '<div class="form-grid">' +
        '<div class="form-group"><label class="form-label">Tipo *</label><input class="form-input" id="ins-tipo" placeholder="Ex: Inspeção elétrica"></div>' +
        '<div class="form-group"><label class="form-label">Data</label><input type="date" class="form-input" id="ins-data" value="' + new Date().toISOString().split('T')[0] + '"></div>' +
        '<div class="form-group"><label class="form-label">Resultado</label><select class="form-input" id="ins-res"><option value="aprovado">Aprovado</option><option value="reprovado">Reprovado</option></select></div>' +
        '<div class="form-group"><label class="form-label">Responsável</label><input class="form-input" id="ins-resp" placeholder="Nome"></div>' +
        '<div class="form-group form-full"><label class="form-label">Observação</label><input class="form-input" id="ins-obs" placeholder="Detalhes da inspeção"></div>' +
      '</div>' +
      '<div class="form-actions">' +
        '<button class="btn-secondary" onclick="document.getElementById(\'insp-form\').innerHTML=\'\'">Cancelar</button>' +
        '<button class="btn-primary" onclick="window.salvarInsp(\'' + oid + '\')">Salvar</button>' +
      '</div>' +
    '</div>';
};

window.salvarInsp = async (oid) => {
  const tipo = document.getElementById('ins-tipo').value.trim();
  if (!tipo) return alert('Tipo obrigatório');
  await addDoc(sub(oid,'inspecoes'), {
    tipo,
    data: document.getElementById('ins-data').value,
    resultado: document.getElementById('ins-res').value,
    responsavel: document.getElementById('ins-resp').value,
    observacao: document.getElementById('ins-obs').value,
    created_at: serverTimestamp()
  });
  window.loadOp(oid);
};
window.delInsp = async (oid, id) => { if(!confirm('Excluir?'))return; await deleteDoc(doc(db,'obras',oid,'inspecoes',id)); window.loadOp(oid); };

window.showNCForm = (oid) => {
  document.getElementById('nc-form').innerHTML =
    '<div class="form-wrap" style="margin-bottom:14px;">' +
      '<div style="display:flex;justify-content:space-between;margin-bottom:16px;"><span style="font-size:14px;font-weight:500;color:#fff;">Nova não conformidade</span><button class="btn-close" onclick="document.getElementById(\'nc-form\').innerHTML=\'\'">×</button></div>' +
      '<div class="form-grid">' +
        '<div class="form-group form-full"><label class="form-label">Descrição *</label><input class="form-input" id="nc-desc" placeholder="Ex: Fiação fora do padrão"></div>' +
        '<div class="form-group"><label class="form-label">Responsável</label><input class="form-input" id="nc-resp" placeholder="Nome"></div>' +
        '<div class="form-group"><label class="form-label">Prazo</label><input type="date" class="form-input" id="nc-prazo"></div>' +
      '</div>' +
      '<div class="form-actions">' +
        '<button class="btn-secondary" onclick="document.getElementById(\'nc-form\').innerHTML=\'\'">Cancelar</button>' +
        '<button class="btn-primary" onclick="window.salvarNC(\'' + oid + '\')">Salvar</button>' +
      '</div>' +
    '</div>';
};

window.salvarNC = async (oid) => {
  const desc = document.getElementById('nc-desc').value.trim();
  if (!desc) return alert('Descrição obrigatória');
  await addDoc(sub(oid,'nao_conformidades'), {
    descricao: desc,
    responsavel: document.getElementById('nc-resp').value,
    prazo: document.getElementById('nc-prazo').value,
    status: 'aberta',
    created_at: serverTimestamp()
  });
  window.loadOp(oid);
};

window.resolverNC = async (oid, id) => {
  const resolucao = prompt('Descreva a resolução:');
  if (!resolucao) return;
  await updateDoc(doc(db,'obras',oid,'nao_conformidades',id), {
    status: 'resolvida',
    resolucao,
    data_resolucao: new Date().toISOString().split('T')[0]
  });
  window.loadOp(oid);
};
window.delNC = async (oid, id) => { if(!confirm('Excluir?'))return; await deleteDoc(doc(db,'obras',oid,'nao_conformidades',id)); window.loadOp(oid); };

</script>
</body>
</html>
